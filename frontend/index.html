<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cmd-patrol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .log-viewer {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.4;
        }
        .status-running { color: #22c55e; }
        .status-stopped { color: #6b7280; }
        .status-error { color: #ef4444; }
        .status-orphan { color: #f59e0b; }
        .service-item.selected { background-color: #1e3a5f; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: #1f2937; border: 1px solid #374151; border-radius: 8px; width: 600px; max-height: 70vh; display: flex; flex-direction: column; }
        .browse-item:hover { background: #374151; }
        .browse-item.is-file { color: #60a5fa; }

        /* Slim dark scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        textarea::-webkit-scrollbar-thumb { background: #374151; }
        textarea::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        * { scrollbar-width: thin; scrollbar-color: #4b5563 transparent; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-gray-800 px-4 py-3 flex items-center justify-between border-b border-gray-700">
        <h1 class="text-xl font-bold text-blue-400">cmd-patrol</h1>
        <div class="flex gap-2">
            <button onclick="openMQ()" class="bg-yellow-600 hover:bg-yellow-700 px-4 py-2 rounded text-sm font-medium relative">
                消息队列 <span id="mqBadge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center"></span>
            </button>
            <button onclick="openKillDialog()" class="bg-orange-600 hover:bg-orange-700 px-4 py-2 rounded text-sm font-medium">
                Kill
            </button>
            <button onclick="openDomains()" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm font-medium">
                域名
            </button>
            <button onclick="startAll()" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded text-sm font-medium">
                全部启动
            </button>
            <button onclick="stopAll()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-medium">
                全部停止
            </button>
            <button onclick="openBrowser()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm font-medium">
                + 注册脚本
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden">
        <!-- Left: Service List -->
        <div class="w-80 bg-gray-800 border-r border-gray-700 flex flex-col">
            <div class="px-3 py-2 text-sm text-gray-400 border-b border-gray-700">
                服务列表 (<span id="serviceCount">0</span>)
            </div>
            <div id="serviceList" class="flex-1 overflow-y-auto">
                <!-- Services will be rendered here -->
            </div>
        </div>

        <!-- Right: Details + Logs -->
        <div class="flex-1 flex flex-col">
            <!-- Service Details -->
            <div id="detailsPanel" class="bg-gray-800 border-b border-gray-700 px-4 py-2 hidden">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3 min-w-0">
                        <h2 id="detailName" class="font-semibold whitespace-nowrap"></h2>
                        <span id="detailStatus" class="text-sm"></span>
                        <span class="text-gray-600">|</span>
                        <span class="text-xs text-gray-500 truncate" id="detailScript"></span>
                        <span class="text-gray-600">|</span>
                        <span class="text-xs text-gray-500">PID: <span id="detailPid"></span></span>
                        <span class="text-xs text-blue-400 cursor-pointer hover:underline" onclick="editPort()" id="detailPort"></span>
                        <span class="text-xs text-blue-300 cursor-pointer hover:underline bg-blue-900/30 px-1.5 py-0.5 rounded" onclick="editGroup()" id="detailGroup" title="点击设置分组"></span>
                    </div>
                    <div class="flex gap-1 ml-2 flex-shrink-0">
                        <button onclick="startSelected()" class="bg-green-600 hover:bg-green-700 px-2 py-1 rounded text-xs">启动</button>
                        <button onclick="stopSelected()" class="bg-red-600 hover:bg-red-700 px-2 py-1 rounded text-xs">停止</button>
                        <button onclick="restartSelected()" class="bg-yellow-600 hover:bg-yellow-700 px-2 py-1 rounded text-xs">重启</button>
                        <button onclick="openFolderSelected()" class="bg-gray-600 hover:bg-gray-700 px-2 py-1 rounded text-xs">目录</button>
                        <button onclick="deleteSelected()" class="bg-gray-600 hover:bg-gray-700 px-2 py-1 rounded text-xs">删除</button>
                    </div>
                </div>
                <div class="text-xs text-gray-500 mt-1 truncate">
                    <span id="detailCwd"></span> &mdash; <span id="detailCommand" class="text-gray-400"></span>
                </div>
            </div>

            <!-- Tab Bar + Content -->
            <div class="flex-1 flex flex-col overflow-hidden">
                <div class="px-4 py-2 bg-gray-800 border-b border-gray-700 flex items-center justify-between">
                    <div class="flex gap-1">
                        <button id="tabLogs" onclick="switchTab('logs')" class="px-3 py-1 text-sm rounded-t font-medium bg-gray-950 text-gray-200">实时日志</button>
                        <button id="tabConfig" onclick="switchTab('config')" class="px-3 py-1 text-sm rounded-t font-medium text-gray-500 hover:text-gray-300">配置文件</button>
                    </div>
                    <div id="logControls" class="flex gap-2">
                        <label class="text-sm text-gray-400 flex items-center gap-1">
                            <input type="checkbox" id="autoScroll" checked class="rounded">
                            自动滚动
                        </label>
                        <button onclick="clearLogs()" class="text-sm text-gray-400 hover:text-gray-200">清空</button>
                    </div>
                    <div id="configControls" class="flex gap-2 hidden">
                        <span id="configFilePath" class="text-xs text-gray-500 truncate max-w-md cursor-pointer hover:text-gray-300" onclick="setConfigPath()"></span>
                        <button onclick="saveConfig()" class="text-sm text-green-400 hover:text-green-200 font-medium">保存</button>
                        <button onclick="loadConfig()" class="text-sm text-gray-400 hover:text-gray-200">刷新</button>
                        <button onclick="setConfigPath()" class="text-sm text-gray-400 hover:text-gray-200">设置路径</button>
                    </div>
                </div>
                <div id="logViewer" class="flex-1 bg-gray-950 p-3 overflow-y-auto log-viewer">
                    <div class="text-gray-500">选择一个服务查看日志...</div>
                </div>
                <div id="configEditor" class="flex-1 flex flex-col overflow-hidden hidden">
                    <textarea id="configTextarea" class="flex-1 bg-gray-950 text-gray-200 p-3 font-mono text-sm resize-none outline-none border-none" spellcheck="false" placeholder="未设置配置文件路径，点击上方「设置路径」关联配置文件..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- File Browser Modal -->
    <div id="browserModal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="px-4 py-3 border-b border-gray-700 flex items-center justify-between">
                <span class="font-semibold">选择脚本文件</span>
                <button onclick="closeBrowser()" class="text-gray-400 hover:text-white text-lg">&times;</button>
            </div>
            <div id="browserPath" class="px-4 py-2 text-xs text-gray-400 border-b border-gray-700 truncate"></div>
            <div id="browserList" class="flex-1 overflow-y-auto" style="max-height: 50vh;"></div>
        </div>
    </div>

    <!-- Kill Dialog -->
    <div id="killModal" class="modal-overlay hidden">
        <div class="modal-box" style="width: 420px;">
            <div class="px-4 py-3 border-b border-gray-700 flex items-center justify-between">
                <span class="font-semibold">Kill Process</span>
                <button onclick="closeKill()" class="text-gray-400 hover:text-white text-xl">&times;</button>
            </div>
            <div class="p-4 space-y-3">
                <div>
                    <label class="text-sm text-gray-400">PID</label>
                    <div class="flex gap-2 mt-1">
                        <input id="killPidInput" type="text" placeholder="e.g. 12345" class="flex-1 bg-gray-700 text-sm px-3 py-2 rounded border border-gray-600 focus:border-blue-500 outline-none">
                        <button onclick="doKill('pid')" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-medium">Kill</button>
                    </div>
                </div>
                <div>
                    <label class="text-sm text-gray-400">Port</label>
                    <div class="flex gap-2 mt-1">
                        <input id="killPortInput" type="text" placeholder="e.g. 8080" class="flex-1 bg-gray-700 text-sm px-3 py-2 rounded border border-gray-600 focus:border-blue-500 outline-none">
                        <button onclick="doKill('port')" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-medium">Kill</button>
                    </div>
                </div>
                <div id="killResult" class="text-sm text-gray-400 min-h-[24px]"></div>
            </div>
        </div>
    </div>

    <!-- Domains Modal -->
    <div id="domainsModal" class="modal-overlay hidden">
        <div class="modal-box" style="width: 800px; max-height: 85vh;">
            <div class="px-4 py-3 border-b border-gray-700 flex items-center justify-between">
                <div class="flex gap-1">
                    <button onclick="switchDomainTab('config')" id="domTabConfig" class="px-3 py-1 text-sm rounded-t font-medium bg-gray-950 text-gray-200">域名配置</button>
                    <button onclick="switchDomainTab('sync')" id="domTabSync" class="px-3 py-1 text-sm rounded-t font-medium text-gray-500 hover:text-gray-300">同步应用</button>
                </div>
                <button onclick="closeDomains()" class="text-gray-400 hover:text-white text-lg">&times;</button>
            </div>

            <!-- Tab 1: 域名配置 -->
            <div id="domPanelConfig" class="flex flex-col overflow-hidden" style="max-height: calc(85vh - 110px);">
                <div class="px-4 py-3 border-b border-gray-700 flex items-center justify-between">
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <label class="text-sm text-gray-300 whitespace-nowrap">活跃域名</label>
                        <select id="activeDomainSelect" class="flex-1 bg-gray-900 border border-gray-700 rounded px-3 py-1.5 text-sm min-w-0">
                            <option value="">(未选择)</option>
                        </select>
                    </div>
                    <div class="flex gap-2 ml-3">
                        <button onclick="saveDomains()" class="bg-blue-600 hover:bg-blue-700 px-3 py-1.5 rounded text-xs font-medium">保存</button>
                        <button onclick="addDomainRow()" class="bg-green-600 hover:bg-green-700 px-3 py-1.5 rounded text-xs font-medium">+ 添加</button>
                    </div>
                </div>
                <div id="domainListPanel" class="flex-1 overflow-y-auto px-4 py-3 space-y-3"></div>
                <div id="domainsStatus" class="px-4 py-2 text-xs text-gray-400 border-t border-gray-700"></div>
            </div>

            <!-- Tab 2: 同步应用配置 -->
            <div id="domPanelSync" class="hidden flex flex-col overflow-hidden" style="max-height: calc(85vh - 110px);">
                <div class="px-4 py-3 border-b border-gray-700 text-xs text-gray-400">
                    当前活跃域名会被写入下方各项目的配置文件。
                </div>
                <div class="flex-1 overflow-y-auto px-4 py-3 space-y-4">
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">写入目标（项目 / 配置文件）</label>
                        <div id="targetsList" class="bg-gray-900 border border-gray-700 rounded px-3 py-2 text-xs text-gray-300 space-y-1"></div>
                    </div>
                    <details class="bg-gray-900/40 border border-gray-700 rounded">
                        <summary class="cursor-pointer px-3 py-2 text-sm text-gray-300">高级：targets 配置（JSON）</summary>
                        <div class="px-3 pb-3">
                            <textarea id="targetsJsonInput" class="w-full bg-gray-950 border border-gray-700 rounded px-3 py-2 text-xs font-mono" rows="10" placeholder='{"myproj": {"type": "js_config", "file": "C:/.../config.js", "suffix": "/api"}}'></textarea>
                            <div class="text-[11px] text-gray-400 mt-2">
                                修改后点"保存"即可写入 domains.json。随后"应用到项目"会按该配置写文件。
                            </div>
                        </div>
                    </details>
                    <div id="syncStatus" class="text-xs text-gray-400"></div>
                </div>
                <div class="px-4 py-3 border-t border-gray-700 flex items-center justify-end gap-2">
                    <button onclick="saveDomains()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm font-medium">保存</button>
                    <button onclick="applyDomains()" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded text-sm font-medium">应用到项目</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MQ Modal -->
    <div id="mqModal" class="modal-overlay hidden">
        <div class="modal-box" style="width: 800px; max-height: 80vh;">
            <div class="px-4 py-3 border-b border-gray-700 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="font-semibold">消息队列</span>
                    <span id="mqStats" class="text-xs text-gray-400"></span>
                </div>
                <div class="flex items-center gap-2">
                    <select id="mqFilterStatus" onchange="loadMQ()" class="bg-gray-900 border border-gray-700 rounded px-2 py-1 text-xs">
                        <option value="new,ack">待处理 (new+ack)</option>
                        <option value="new">仅 new</option>
                        <option value="ack">仅 ack</option>
                        <option value="done">已处理</option>
                        <option value="">全部</option>
                    </select>
                    <select id="mqFilterSource" onchange="loadMQ()" class="bg-gray-900 border border-gray-700 rounded px-2 py-1 text-xs">
                        <option value="">全部来源</option>
                    </select>
                    <button onclick="closeMQ()" class="text-gray-400 hover:text-white text-lg">&times;</button>
                </div>
            </div>
            <div id="mqList" class="flex-1 overflow-y-auto" style="max-height: 60vh;"></div>
            <div class="px-4 py-2 border-t border-gray-700 flex items-center justify-between">
                <span id="mqCount" class="text-xs text-gray-500"></span>
                <div class="flex gap-2">
                    <button onclick="mqBatchAck()" class="text-xs text-gray-400 hover:text-gray-200">全部标为已通知</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let services = [];
        let selectedId = null;
        let logOffset = 0;
        let logPollTimer = null;
        let currentTab = 'logs';

        let domainsCache = null;

        async function fetchServices() {
            const res = await fetch(`${API_BASE}/api/services`);
            services = await res.json();
            renderServices();
        }

        function openKillDialog() {
            document.getElementById('killModal').classList.remove('hidden');
            document.getElementById('killPidInput').value = '';
            document.getElementById('killPortInput').value = '';
            document.getElementById('killResult').textContent = '';
        }

        function closeKill() {
            document.getElementById('killModal').classList.add('hidden');
        }

        async function doKill(type) {
            const resultEl = document.getElementById('killResult');
            const body = {};
            if (type === 'pid') {
                const v = document.getElementById('killPidInput').value.trim();
                if (!v) return;
                body.pid = v;
            } else {
                const v = document.getElementById('killPortInput').value.trim();
                if (!v) return;
                body.port = v;
            }
            resultEl.textContent = '执行中...';
            try {
                const res = await fetch(`${API_BASE}/api/kill`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.error) {
                    resultEl.textContent = data.error;
                    resultEl.className = 'text-sm text-red-400 min-h-[24px]';
                } else {
                    resultEl.textContent = (data.results || []).join('\n');
                    resultEl.className = 'text-sm text-green-400 min-h-[24px]';
                }
                await fetchServices();
            } catch (e) {
                resultEl.textContent = '请求失败';
                resultEl.className = 'text-sm text-red-400 min-h-[24px]';
            }
        }

        let domainTab = 'config';

        async function openDomains() {
            document.getElementById('domainsModal').classList.remove('hidden');
            await refreshDomains();
        }

        function closeDomains() {
            document.getElementById('domainsModal').classList.add('hidden');
        }

        function switchDomainTab(tab) {
            domainTab = tab;
            document.getElementById('domPanelConfig').classList.toggle('hidden', tab !== 'config');
            document.getElementById('domPanelSync').classList.toggle('hidden', tab !== 'sync');
            document.getElementById('domTabConfig').className = tab === 'config'
                ? 'px-3 py-1 text-sm rounded-t font-medium bg-gray-950 text-gray-200'
                : 'px-3 py-1 text-sm rounded-t font-medium text-gray-500 hover:text-gray-300';
            document.getElementById('domTabSync').className = tab === 'sync'
                ? 'px-3 py-1 text-sm rounded-t font-medium bg-gray-950 text-gray-200'
                : 'px-3 py-1 text-sm rounded-t font-medium text-gray-500 hover:text-gray-300';
        }

        async function refreshDomains() {
            const status = document.getElementById('domainsStatus');
            status.textContent = '加载中...';
            try {
                const res = await fetch(`${API_BASE}/api/domains`);
                if (!res.ok) throw new Error('加载失败');
                domainsCache = await res.json();
                const active = (domainsCache.active || '').toString();
                const candidates = Array.isArray(domainsCache.candidates) ? domainsCache.candidates : [];
                syncActiveDomainSelect(active, candidates);
                renderDomainList(candidates);
                renderTargets(domainsCache.targets);
                document.getElementById('targetsJsonInput').value = JSON.stringify(domainsCache.targets || {}, null, 2);
                status.textContent = '';
            } catch (e) {
                status.textContent = '加载失败';
            }
        }

        function syncActiveDomainSelect(active, candidates) {
            const select = document.getElementById('activeDomainSelect');
            const urls = candidates.map(c => typeof c === 'string' ? c : (c.url || '')).filter(Boolean);
            const unique = Array.from(new Set(urls));

            select.innerHTML = '<option value="">(未选择)</option>';
            unique.forEach((d) => {
                const opt = document.createElement('option');
                opt.value = d;
                opt.textContent = d;
                select.appendChild(opt);
            });

            if (active && !unique.includes(active)) {
                const opt = document.createElement('option');
                opt.value = active;
                opt.textContent = `${active} (不在候选列表)`;
                select.appendChild(opt);
            }
            select.value = active || '';
        }

        function renderDomainList(candidates) {
            const panel = document.getElementById('domainListPanel');
            if (!candidates || candidates.length === 0) {
                panel.innerHTML = '<div class="text-gray-500 text-sm text-center py-4">暂无域名，点击"+ 添加"</div>';
                return;
            }
            panel.innerHTML = candidates.map((c, i) => {
                const url = typeof c === 'string' ? c : (c.url || '');
                const cmd = typeof c === 'object' ? (c.ngrok_cmd || '') : '';
                return `<div class="bg-gray-800 border border-gray-700 rounded p-3 space-y-2" data-dom-idx="${i}">
                    <div class="flex items-center gap-2">
                        <input type="text" value="${escapeAttr(url)}" placeholder="https://xxx.ngrok-free.dev"
                               class="dom-url flex-1 bg-gray-900 border border-gray-600 rounded px-2 py-1.5 text-sm focus:border-blue-500 outline-none min-w-0">
                        <button onclick="removeDomainRow(${i})" class="text-gray-500 hover:text-red-400 text-lg px-1" title="删除">&times;</button>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="text" value="${escapeAttr(cmd)}" placeholder="ngrok config command (e.g. ngrok http --domain=xxx 80)"
                               class="dom-cmd flex-1 bg-gray-900 border border-gray-600 rounded px-2 py-1.5 text-xs font-mono focus:border-blue-500 outline-none min-w-0">
                        <button onclick="runNgrokCmd(${i})" class="bg-orange-600 hover:bg-orange-700 px-3 py-1.5 rounded text-xs font-medium whitespace-nowrap" title="执行命令">Run</button>
                    </div>
                    <div class="dom-result text-xs min-h-0 hidden"></div>
                </div>`;
            }).join('');
        }

        function escapeAttr(s) {
            if (!s) return '';
            return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function addDomainRow() {
            const candidates = collectDomainRows();
            candidates.push({url: '', ngrok_cmd: ''});
            renderDomainList(candidates);
            const panel = document.getElementById('domainListPanel');
            panel.scrollTop = panel.scrollHeight;
        }

        function removeDomainRow(idx) {
            const candidates = collectDomainRows();
            candidates.splice(idx, 1);
            renderDomainList(candidates);
            syncActiveDomainSelect(document.getElementById('activeDomainSelect').value, candidates);
        }

        function collectDomainRows() {
            const rows = document.querySelectorAll('#domainListPanel [data-dom-idx]');
            const result = [];
            rows.forEach(row => {
                const url = (row.querySelector('.dom-url')?.value || '').trim();
                const cmd = (row.querySelector('.dom-cmd')?.value || '').trim();
                result.push({url, ngrok_cmd: cmd});
            });
            return result;
        }

        async function runNgrokCmd(idx) {
            const rows = document.querySelectorAll('#domainListPanel [data-dom-idx]');
            const row = rows[idx];
            if (!row) return;
            const cmd = (row.querySelector('.dom-cmd')?.value || '').trim();
            if (!cmd) return;
            const resultEl = row.querySelector('.dom-result');
            resultEl.classList.remove('hidden');
            resultEl.textContent = '执行中...';
            resultEl.className = 'dom-result text-xs text-gray-400';
            try {
                const res = await fetch(`${API_BASE}/api/domains/run-ngrok`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cmd})
                });
                const data = await res.json();
                if (data.error) {
                    resultEl.textContent = data.error;
                    resultEl.className = 'dom-result text-xs text-red-400';
                } else {
                    const out = [data.stdout, data.stderr].filter(Boolean).join('\n').trim();
                    resultEl.textContent = data.exit_code === 0
                        ? (out || '执行成功') : `exit ${data.exit_code}: ${out}`;
                    resultEl.className = data.exit_code === 0
                        ? 'dom-result text-xs text-green-400' : 'dom-result text-xs text-red-400';
                }
            } catch (e) {
                resultEl.textContent = '请求失败';
                resultEl.className = 'dom-result text-xs text-red-400';
            }
        }

        function renderTargets(targets) {
            const el = document.getElementById('targetsList');
            const t = targets && typeof targets === 'object' ? targets : {};
            const keys = Object.keys(t);
            if (keys.length === 0) {
                el.innerHTML = '<div class="text-gray-500">(无 targets 配置)</div>';
                return;
            }
            el.innerHTML = keys.map((k) => {
                const item = t[k] || {};
                const file = item.file || '';
                const suffix = item.suffix || '';
                const type = item.type || '';
                const autoCommit = item.auto_commit || false;
                const commitMsg = item.commit_msg || 'change domain';
                return `<div class="border-b border-gray-700/50 py-2 space-y-1.5" data-target-name="${escapeAttr(k)}">
                    <div class="flex items-start justify-between gap-3">

        function collectTargetCommitSettings() {
            const rows = document.querySelectorAll('#targetsList [data-target-name]');
            const settings = {};
            rows.forEach(row => {
                const name = row.dataset.targetName;
                const checked = row.querySelector('.target-commit-chk')?.checked || false;
                const msg = (row.querySelector('.target-commit-msg')?.value || '').trim() || 'change domain';
                settings[name] = { auto_commit: checked, commit_msg: msg };
            });
            return settings;
        }

        async function saveDomains() {
            const status = document.getElementById('domainsStatus');
            status.textContent = '保存中...';

            const active = document.getElementById('activeDomainSelect').value.trim();
            const candidates = collectDomainRows().filter(c => c.url);

            let targets = null;
            const targetsRaw = document.getElementById('targetsJsonInput').value.trim();
            if (targetsRaw) {
                try {
                    targets = JSON.parse(targetsRaw);
                } catch (e) {
                    status.textContent = 'targets JSON 格式错误';
                    return;
                }
            }

            const commitSettings = collectTargetCommitSettings();
            const baseTargets = targets || (domainsCache && domainsCache.targets) || {};
            for (const [name, s] of Object.entries(commitSettings)) {
                if (baseTargets[name]) {
                    baseTargets[name].auto_commit = s.auto_commit;
                    baseTargets[name].commit_msg = s.commit_msg;
                }
            }
            targets = baseTargets;

            const body = { active, candidates };
            if (domainTab === 'sync') {
                body.targets = targets;
            }

            try {
                const res = await fetch(`${API_BASE}/api/domains`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!res.ok) throw new Error('保存失败');
                domainsCache = await res.json();
                const cands = Array.isArray(domainsCache.candidates) ? domainsCache.candidates : [];
                syncActiveDomainSelect((domainsCache.active || '').toString(), cands);
                renderTargets(domainsCache.targets);
                document.getElementById('targetsJsonInput').value = JSON.stringify(domainsCache.targets || {}, null, 2);
                status.textContent = '已保存';
                setTimeout(() => { status.textContent = ''; }, 1200);
            } catch (e) {
                status.textContent = '保存失败';
            }
        }

        async function applyDomains() {
            const status = document.getElementById('syncStatus');
            status.textContent = '应用中...';
            try {
                await saveDomains();
                const res = await fetch(`${API_BASE}/api/domains/apply`, { method: 'POST' });
                if (!res.ok) throw new Error('应用失败');
                const data = await res.json();
                const results = Array.isArray(data.results) ? data.results : [];
                const okCount = results.filter(r => r.ok).length;
                const lines = results.map(r => {
                    let s = `${r.ok ? '✅' : '❌'} ${r.target}: ${r.message}`;
                    if (r.git) s += ` | git: ${r.git}`;
                    return s;
                });
                status.innerHTML = `<div class="space-y-0.5">${lines.map(l => `<div>${escapeHtml(l)}</div>`).join('')}</div>`;
            } catch (e) {
                status.textContent = '应用失败';
            }
        }

        function renderServices() {
            const list = document.getElementById('serviceList');
            document.getElementById('serviceCount').textContent = services.length;

            if (services.length === 0) {
                list.innerHTML = '<div class="p-4 text-gray-500 text-sm">暂无服务，点击右上角注册脚本</div>';
                return;
            }

            const groups = {};
            const ungrouped = [];
            services.forEach(s => {
                if (s.group) {
                    (groups[s.group] = groups[s.group] || []).push(s);
                } else {
                    ungrouped.push(s);
                }
            });

            const sortedGroupNames = Object.keys(groups).sort();
            let html = '';

            for (const gname of sortedGroupNames) {
                const items = groups[gname];
                const running = items.filter(s => s.status === 'running').length;
                const total = items.length;
                const collapsed = !expandedGroups[gname];
                const genc = encodeURIComponent(gname);
                html += `
                <div class="border-b border-gray-600">
                    <div class="flex items-center justify-between px-3 py-2 bg-gray-750 cursor-pointer hover:bg-gray-700 select-none"
                         style="background:#2d3748" onclick="toggleGroup('${escapeAttr(gname)}')">
                        <div class="flex items-center gap-2 min-w-0">
                            <span class="text-xs text-gray-400">${collapsed ? '▶' : '▼'}</span>
                            <span class="font-semibold text-sm text-blue-300 truncate">${escapeHtml(gname)}</span>
                            <span class="text-[11px] text-gray-400">${running}/${total}</span>
                        </div>
                        <div class="flex gap-1 flex-shrink-0" onclick="event.stopPropagation()">
                            <button onclick="groupAction('${genc}','start')" class="bg-green-700 hover:bg-green-600 px-1.5 py-0.5 rounded text-[10px]" title="启动本组">▶</button>
                            <button onclick="groupAction('${genc}','stop')" class="bg-red-700 hover:bg-red-600 px-1.5 py-0.5 rounded text-[10px]" title="停止本组">■</button>
                            <button onclick="groupAction('${genc}','restart')" class="bg-yellow-700 hover:bg-yellow-600 px-1.5 py-0.5 rounded text-[10px]" title="重启本组">↻</button>
                        </div>
                    </div>
                    ${collapsed ? '' : items.map(s => renderServiceItem(s)).join('')}
                </div>`;
            }

            ungrouped.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
            html += ungrouped.map(s => renderServiceItem(s)).join('');

            list.innerHTML = html;
        }

        function startLogPolling(id) {
            if (logPollTimer) clearInterval(logPollTimer);

        async function pollLogs(initial) {
            if (!selectedId) return;
            try {
                let url = `${API_BASE}/api/services/${selectedId}/logs?offset=${logOffset}`;
                if (initial) url += '&tail=500';
                const res = await fetch(url);
                const data = await res.json();
                if (data.lines && data.lines.length > 0) {
                    appendLogBatch(data.lines);
                    logOffset = data.offset;
                }
            } catch(e) {}
        }

        function appendLogBatch(lines) {
            const viewer = document.getElementById('logViewer');
            const frag = document.createDocumentFragment();
            for (const line of lines) {
                const div = document.createElement('div');
                div.textContent = line.replace(/\n$/, '');
                div.className = 'whitespace-pre-wrap break-all';
                frag.appendChild(div);
            }
            viewer.appendChild(frag);
            if (document.getElementById('autoScroll').checked) {
                viewer.scrollTop = viewer.scrollHeight;
            }
        }

            if (data.error) { alert(data.error); return; }

            document.getElementById('browserPath').textContent = data.current || '我的电脑';

                const escaped = item.path.replace(/\\/g, '\\\\');
                if (item.type === 'dir') {
                    html += `<div class="browse-item px-4 py-2 cursor-pointer text-gray-300 border-b border-gray-800" onclick="browseTo('${escaped}')">📁 ${item.name}</div>`;

        async function loadMQ() {
            const status = document.getElementById('mqFilterStatus').value;
            const source = document.getElementById('mqFilterSource').value;
            let url = `${API_BASE}/api/mq/messages?limit=200`;
            if (status) url += `&status=${status}`;
            if (source) url += `&source=${encodeURIComponent(source)}`;

            const [msgRes, statsRes] = await Promise.all([
                fetch(url),
                fetch(`${API_BASE}/api/mq/stats`)
            ]);
            const data = await msgRes.json();
            const stats = await statsRes.json();
            mqMessages = data.messages;

            document.getElementById('mqStats').textContent =
                `new: ${stats.new} | ack: ${stats.ack} | done: ${stats.done} | total: ${stats.total}`;
            document.getElementById('mqCount').textContent = `显示 ${mqMessages.length} / ${data.total} 条`;

            // update badge
            const badge = document.getElementById('mqBadge');
            if (stats.new > 0) {
                badge.textContent = stats.new > 99 ? '99+' : stats.new;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }

            renderMQ();
        }

        function renderMQ() {
            const el = document.getElementById('mqList');
            if (!mqMessages.length) {
                el.innerHTML = '<div class="p-4 text-gray-500 text-sm text-center">暂无消息</div>';
                return;
            }
            el.innerHTML = mqMessages.map(m => {
                const statusColor = m.status === 'new' ? 'text-yellow-400' :
                                    m.status === 'ack' ? 'text-blue-400' : 'text-gray-500';
                const statusDot = m.status === 'new' ? '🔴' :
                                  m.status === 'ack' ? '🟡' : '✅';
                const time = m.created_at ? m.created_at.replace('T', ' ').substring(0, 19) : '';
                const actions = m.status !== 'done'
                    ? `<div class="flex gap-1 mt-1">
                        ${m.status === 'new' ? `<button onclick="mqAckOne('${m.id}')" class="text-xs text-blue-400 hover:text-blue-200">标为已通知</button>` : ''}
                        <button onclick="mqDoneOne('${m.id}')" class="text-xs text-green-400 hover:text-green-200">标为已处理</button>
                        <button onclick="mqBatchDoneBefore('${m.id}')" class="text-xs text-gray-400 hover:text-gray-200">此条及之前全部处理</button>
                       </div>`
                    : '';
                return `<div class="px-4 py-2 border-b border-gray-700/50 hover:bg-gray-800/50">
                    <div class="flex items-start justify-between gap-2">
                        <div class="min-w-0 flex-1">
                            <div class="flex items-center gap-2">
                                <span class="text-xs">${statusDot}</span>
                                <span class="text-sm font-medium">${escapeHtml(m.title)}</span>
                                <span class="text-xs ${statusColor}">${m.status}</span>
                            </div>
                            <div class="text-xs text-gray-500 mt-0.5">
                                <span class="text-gray-400">${escapeHtml(m.source)}</span>
                                ${m.type ? `<span class="text-gray-600">/ ${escapeHtml(m.type)}</span>` : ''}
                                <span class="ml-2">${time}</span>
                            </div>
                            ${m.detail ? `<div class="text-xs text-gray-400 mt-1 whitespace-pre-wrap break-all">${escapeHtml(m.detail)}</div>` : ''}
                        </div>
                    </div>
                    ${actions}
                </div>`;
            }).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        async function mqAckOne(id) {
            await fetch(`${API_BASE}/api/mq/messages/${id}/ack`, { method: 'POST' });
            await loadMQ();
        }

        async function mqDoneOne(id) {
            await fetch(`${API_BASE}/api/mq/messages/${id}/done`, { method: 'POST' });
            await loadMQ();
        }

        async function mqBatchDoneBefore(id) {
            const msg = mqMessages.find(m => m.id === id);
            if (!msg) return;
            if (!confirm(`确定要将此消息及之前的所有未处理消息标为已处理吗？`)) return;
            await fetch(`${API_BASE}/api/mq/batch-done`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ before_id: id })
            });
            await loadMQ();
        }

        async function mqBatchAck() {
            await fetch(`${API_BASE}/api/mq/batch-ack`, { method: 'POST' });
            await loadMQ();
        }

        async function refreshMQBadge() {
            try {
                const res = await fetch(`${API_BASE}/api/mq/stats`);
                const stats = await res.json();
                const badge = document.getElementById('mqBadge');
                if (stats.new > 0) {
                    badge.textContent = stats.new > 99 ? '99+' : stats.new;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            } catch(e) {}
        }

        setInterval(refreshMQBadge, 5000);
        setInterval(fetchServices, 3000);
        fetchServices();
        refreshMQBadge();
    </script>
</body>
</html>
